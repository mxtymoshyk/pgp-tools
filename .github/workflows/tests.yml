name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install GnuPG (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gnupg

      - name: Install GnuPG (macOS)
        if: runner.os == 'macOS'
        run: brew install gnupg || true

      - name: Install GnuPG (Windows)
        if: runner.os == 'Windows'
        run: choco install gnupg --no-progress -y

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,gcp]"

      - name: Run tests with coverage
        run: pytest -v --cov --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
